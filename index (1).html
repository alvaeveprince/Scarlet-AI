<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCARLET AI — Premium Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NOISE OVERLAY -->
<div class="noise-overlay"></div>

<!-- AMBIENT GLOW BLOBS -->
<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- APP SHELL -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">SCARLET<em>AI</em></span>
      </div>
      <button class="btn-icon sidebar-close" id="sidebarClose" title="Close sidebar">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <button class="btn-new-chat" id="newChatBtn">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New Conversation
    </button>

    <div class="sidebar-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchChats" placeholder="Search conversations…" autocomplete="off" />
    </div>

    <div class="chat-list-label">Recent</div>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <button class="btn-settings" id="openSettings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </aside>

  <!-- SIDEBAR OVERLAY -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN CONTENT -->
  <main class="main" id="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="btn-icon hamburger" id="hamburger" title="Toggle sidebar">
        <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">New Conversation</div>
      <div class="topbar-actions">
        <button class="btn-icon" id="searchToggle" title="Search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="btn-icon" id="topSettingsBtn" title="Settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">

      <!-- WELCOME SCREEN -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-glyph">⬡</div>
        <h1 class="welcome-title">SCARLET <span>AI</span></h1>
        <p class="welcome-sub">Precision intelligence. Fearless answers.</p>
        <div class="welcome-grid">
          <button class="prompt-chip" data-prompt="Explain quantum computing in simple terms">
            <span class="chip-icon">⚛</span>
            Explain quantum computing
          </button>
          <button class="prompt-chip" data-prompt="Write a professional email to reschedule a meeting">
            <span class="chip-icon">✉</span>
            Draft a professional email
          </button>
          <button class="prompt-chip" data-prompt="Give me 5 creative startup ideas in AI">
            <span class="chip-icon">💡</span>
            Creative startup ideas
          </button>
          <button class="prompt-chip" data-prompt="Debug this code and explain the issue">
            <span class="chip-icon">⌨</span>
            Debug my code
          </button>
        </div>
      </div>

      <!-- MESSAGES -->
      <div class="messages" id="messages"></div>

    </div>

    <!-- INPUT AREA -->
    <div class="input-zone">

      <!-- ATTACHMENT PREVIEWS -->
      <div class="attachment-previews" id="attachmentPreviews"></div>

      <div class="input-bar">
        <div class="input-tools">
          <button class="btn-attach" id="fileBtn" title="Attach file">
            <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="btn-attach" id="imageBtn" title="Attach image">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <input type="file" id="fileInput" accept=".pdf,.txt,.doc,.docx" hidden />
          <input type="file" id="imageInput" accept="image/*" hidden />
        </div>

        <textarea
          id="messageInput"
          placeholder="Ask Scarlet anything…"
          rows="1"
          autocomplete="off"
        ></textarea>

        <div class="input-right">
          <button class="btn-voice" id="voiceBtn" title="Voice input">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
          </button>
          <button class="btn-send" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Scarlet AI can make mistakes. Verify important info.</div>
    </div>

  </main>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-backdrop" id="settingsBackdrop">
  <div class="modal settings-modal" id="settingsModal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="btn-icon modal-close" id="closeSettings">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="settings-layout">
      <!-- TABS -->
      <nav class="settings-tabs">
        <button class="stab active" data-tab="appearance">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Appearance
        </button>
        <button class="stab" data-tab="ai">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm0-14a6 6 0 0 0-6 6h2a4 4 0 0 1 8 0h2a6 6 0 0 0-6-6z"/></svg>
          AI Behavior
        </button>
        <button class="stab" data-tab="memory">
          <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          Memory
        </button>
        <button class="stab" data-tab="system">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          System
        </button>
      </nav>

      <!-- PANELS -->
      <div class="settings-panels">

        <!-- APPEARANCE -->
        <div class="spanel active" id="tab-appearance">
          <div class="setting-group">
            <label class="setting-label">Theme</label>
            <div class="toggle-row">
              <span>Dark Mode</span>
              <label class="toggle">
                <input type="checkbox" id="darkModeToggle" checked />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-group">
            <label class="setting-label">Accent Color</label>
            <div class="color-swatches">
              <button class="swatch active" data-color="#8B0000" style="background:#8B0000" title="Deep Scarlet"></button>
              <button class="swatch" data-color="#FF3131" style="background:#FF3131" title="Neon Red"></button>
              <button class="swatch" data-color="#C0392B" style="background:#C0392B" title="Crimson"></button>
              <button class="swatch" data-color="#E74C3C" style="background:#E74C3C" title="Alizarin"></button>
              <button class="swatch" data-color="#FF6B35" style="background:#FF6B35" title="Ember"></button>
              <button class="swatch" data-color="#D4380D" style="background:#D4380D" title="Volcano"></button>
            </div>
          </div>

          <div class="setting-group">
            <label class="setting-label">Font Size</label>
            <div class="btn-group">
              <button class="bgroup-btn" data-size="small">Small</button>
              <button class="bgroup-btn active" data-size="medium">Medium</button>
              <button class="bgroup-btn" data-size="large">Large</button>
            </div>
          </div>

          <div class="setting-group">
            <label class="setting-label">Glow Intensity</label>
            <div class="btn-group">
              <button class="bgroup-btn" data-glow="minimal">Minimal</button>
              <button class="bgroup-btn active" data-glow="soft">Soft</button>
              <button class="bgroup-btn" data-glow="strong">Strong</button>
            </div>
          </div>
        </div>

        <!-- AI BEHAVIOR -->
        <div class="spanel" id="tab-ai">
          <div class="setting-group">
            <label class="setting-label">Response Style</label>
            <div class="btn-group vertical">
              <button class="bgroup-btn active" data-style="professional">Professional</button>
              <button class="bgroup-btn" data-style="friendly">Friendly</button>
              <button class="bgroup-btn" data-style="creative">Creative</button>
            </div>
          </div>

          <div class="setting-group">
            <label class="setting-label">Response Length</label>
            <div class="btn-group">
              <button class="bgroup-btn" data-length="short">Short</button>
              <button class="bgroup-btn active" data-length="balanced">Balanced</button>
              <button class="bgroup-btn" data-length="detailed">Detailed</button>
            </div>
          </div>

          <div class="setting-group">
            <label class="setting-label">Creativity Level <span class="range-val" id="creativityVal">0.7</span></label>
            <input type="range" class="range-slider" id="creativitySlider" min="0" max="1" step="0.1" value="0.7" />
            <div class="range-labels"><span>Precise</span><span>Creative</span></div>
          </div>
        </div>

        <!-- MEMORY -->
        <div class="spanel" id="tab-memory">
          <div class="setting-group">
            <div class="toggle-row">
              <div>
                <strong>Save Chat History</strong>
                <p class="setting-hint">Conversations are saved locally</p>
              </div>
              <label class="toggle">
                <input type="checkbox" id="saveHistoryToggle" checked />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-group">
            <div class="toggle-row">
              <div>
                <strong>Context Memory</strong>
                <p class="setting-hint">Remember context across messages</p>
              </div>
              <label class="toggle">
                <input type="checkbox" id="memoryToggle" checked />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-group">
            <button class="btn-danger-outline" id="clearMemoryBtn">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Clear All Memory
            </button>
          </div>
        </div>

        <!-- SYSTEM -->
        <div class="spanel" id="tab-system">
          <div class="setting-group">
            <label class="setting-label">Gemini API Key</label>
            <div class="api-input-row">
              <input type="password" id="apiKeyInput" placeholder="AIza…" class="text-input" />
              <button class="btn-primary-sm" id="saveApiKey">Save</button>
            </div>
            <button class="btn-text-sm" id="resetApiKey">Reset API Key</button>
          </div>

          <div class="setting-group">
            <label class="setting-label">Danger Zone</label>
            <button class="btn-danger-outline" id="clearAllChatsBtn">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Clear All Chats
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">
    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <img id="lightboxImg" src="" alt="Preview" />
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
</body>
</html>
